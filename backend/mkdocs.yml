site_name: LumiXAI Documentation
site_description: Modular & Interactive Explainable AI Framework
site_author: Lorenzo Gatta
# Public URL: the docs are exposed under /docs/ by the gateway nginx, which
# proxies /docs/ to this server and strips the prefix. `mkdocs serve` ignores
# this path (it serves at root and emits relative URLs, so the site is portable
# under any prefix); site_url is declared for correct canonical links / sitemap
# and for `mkdocs build` output.
site_url: http://lumixai.islab.di.unimi.it/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - toc.integrate # Table of Contents
  palette:
    - scheme: slate # Dark Mode
      primary: orange
      accent: orange

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: ["."]

nav:
  - Home: index.md
  - API Reference:
    - Core Schemas: api/schema.md
    - Database: api/db.md
    - Base Interfaces: api/abstract.md
    - Wrappers: api/wrappers.md
    - Attributors: api/attributors.md
    - Utilities: api/utils.md
    - FastAPI Endpoints: api/main.md