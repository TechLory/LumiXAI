services:
  
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${LUMIXAI_BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./backend/hf_models_cache:/app/hf_models_cache
    environment:
      - HF_HOME=/app/hf_models_cache
      - TRANSFORMERS_CACHE=/app/hf_models_cache # deprecated (-> HF_HOME), can be removed in the future
      - HUGGINGFACE_HUB_CACHE=/app/hf_models_cache
      - HF_HUB_CACHE=/app/hf_models_cache
      - HF_TOKEN=${HF_TOKEN:-}
      - LUMIXAI_DEFAULT_DEVICE=${LUMIXAI_DEFAULT_DEVICE:-auto}
      - LUMIXAI_TEXT_MAX_NEW_TOKENS=${LUMIXAI_TEXT_MAX_NEW_TOKENS:-64}
  
  docs:
    build: ./backend
    ports:
      - "${LUMIXAI_DOCS_PORT:-8001}:8001"
    volumes:
      - ./backend:/app
    # Build the static site, then serve it. Unlike `mkdocs serve` (a dev server),
    # this honors site_url for canonical links and injects no livereload script, so
    # it behaves correctly behind the /docs/ reverse proxy. Output goes to /site
    # (outside the ./backend mount) so it doesn't litter the source tree.
    command: sh -c "poetry run mkdocs build --site-dir /site && poetry run python -m http.server 8001 --bind 0.0.0.0 --directory /site"
  
  frontend:
    build: ./frontend
    ports:
      - "${LUMIXAI_FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
